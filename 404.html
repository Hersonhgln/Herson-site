<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Introuvable | Herson HOGLONOU</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary:   #0A1A2F;
            --accent:    #E67E22;
            --muted:     rgba(255,255,255,0.5);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            height: 100vh;
            background-color: var(--primary);
            font-family: 'Inter', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            overflow: hidden;
            position: relative;
        }

        /* Fond décoratif */
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: pulse 8s ease-in-out infinite alternate; }
        .orb1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(230,126,34,0.1), transparent 70%); top: -150px; right: -100px; }
        .orb2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(16,40,64,0.8), transparent 70%); bottom: -80px; left: -80px; animation-duration: 11s; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Header */
        header { position: relative; z-index: 5; width: 100%; display: flex; justify-content: center; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 1.3rem; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }

        /* Zone centrale : layout 2 colonnes */
        .main {
            position: relative; z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
            flex: 1;
        }

        /* Colonne gauche : 404 */
        .left-block { text-align: center; flex-shrink: 0; }
        .icon-badge {
            width: 52px; height: 52px;
            background: rgba(230,126,34,0.15);
            border: 1px solid rgba(230,126,34,0.3);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .icon-badge i { font-size: 1.3rem; color: var(--accent); }
        .error-num {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(90px, 14vw, 160px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -6px;
            background: linear-gradient(160deg, #fff 40%, rgba(230,126,34,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Colonne droite : texte + boutons */
        .right-block { max-width: 380px; }
        .right-block h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 800; line-height: 1.2; margin-bottom: 12px;
        }
        .right-block h1 span { color: var(--accent); }
        .right-block p { font-size: 0.92rem; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-primary-404 {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--accent); color: #fff;
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
            padding: 11px 22px; border-radius: 10px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(230,126,34,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary-404:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(230,126,34,0.45); }
        .btn-ghost {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
            color: #fff; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.9rem;
            padding: 11px 22px; border-radius: 10px; text-decoration: none;
            backdrop-filter: blur(6px); transition: background 0.2s, transform 0.2s;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.13); transform: translateY(-2px); }



        /* Footer */
        footer { position: relative; z-index: 5; font-size: 0.75rem; color: var(--muted); }

        /* Mobile */
        @media (max-width: 600px) {
            .main { flex-direction: column; gap: 16px; text-align: center; }
            .right-block { text-align: center; }
            .btn-group, .quick { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <header>
        <a href="index.html" class="logo">Herson<span>.</span></a>
    </header>

    <main class="main">
        <!-- Gauche : 404 -->
        <div class="left-block">
            <div><div class="icon-badge"><i class="fas fa-map-signs"></i></div></div>
            <div class="error-num">404</div>
        </div>

        <!-- Droite : Message -->
        <div class="right-block">
            <h1>Page <span>introuvable.</span></h1>
            <p>Il semblerait que cette page ait disparu dans les champs d'Afrique. Elle a peut-être été déplacée ou n'a jamais existé. Retournons vers quelque chose de concret.</p>

            <div class="btn-group">
                <a href="index.html" class="btn-primary-404">
                    <i class="fas fa-home"></i> Retour à l'accueil
                </a>
                <a href="index.html#contact" class="btn-ghost">
                    <i class="fas fa-envelope"></i> Me contacter
                </a>
            </div>
        </div>
    </main>

    <footer>© 2026 Herson HOGLONOU — Agroéconomiste & Investisseur</footer>

</body>
</html>
